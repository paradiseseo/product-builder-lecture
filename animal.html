<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .animal-container {
            margin-top: 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #webcam-container canvas {
            border-radius: 15px;
            box-shadow: 0 5px 15px var(--shadow-color);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            max-width: 100%;
            border: 3px solid var(--primary-color);
        }
        #label-container {
            width: 100%;
            margin-top: 1rem;
        }
        #label-container div {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0.5rem 0;
            padding: 0.8rem 1rem;
            background: var(--background-color);
            border-radius: 10px;
            border: 1px solid var(--input-border);
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .nav-link:hover {
            color: var(--text-color);
            text-decoration: underline;
        }
        .start-btn {
            margin-top: 1rem;
            width: 80%;
        }
    </style>
</head>
<body>
    <div class="container animal-container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>나의 동물상 테스트</h1>
        <p style="color: var(--text-color); margin-bottom: 0.5rem; font-size: 0.95rem;">AI가 당신의 얼굴을 분석해 동물상을 찾아줍니다!</p>
        
        <button class="generate-btn start-btn" type="button" onclick="init()">웹캠으로 시작하기</button>
        
        <div id="webcam-container"></div>
        <div id="label-container"></div>
        
        <a href="index.html" class="nav-link">← 로또 번호 생성기로 돌아가기</a>
    </div>

    <div class="container disqus-container">
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-arl2ydvdaq.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/C0noC94tz/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const startBtn = document.querySelector('.start-btn');
            startBtn.style.display = 'none';

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(250, 250, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            // Sort by probability highest first
            prediction.sort((a, b) => b.probability - a.probability);

            for (let i = 0; i < maxPredictions; i++) {
                const probability = Math.round(prediction[i].probability * 100);
                const classPrediction = `<span>${prediction[i].className}</span><span>${probability}%</span>`;
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggleBtn.textContent = '☀️';
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            themeToggleBtn.textContent = isDarkMode ? '☀️' : '🌙';
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        });
    </script>
</body>
</html>
