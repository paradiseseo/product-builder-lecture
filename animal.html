<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .animal-container {
            margin-top: 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #image-preview {
            border-radius: 15px;
            box-shadow: 0 5px 15px var(--shadow-color);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            max-width: 250px;
            max-height: 250px;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            display: none;
        }
        .file-upload-wrapper {
            position: relative;
            width: 80%;
            margin-top: 1rem;
        }
        .file-upload-btn {
            width: 100%;
            display: block;
        }
        #image-upload {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .loading-text {
            display: none;
            margin-top: 1.5rem;
            color: var(--text-color);
            font-weight: 600;
        }
        #label-container {
            width: 100%;
            margin-top: 1rem;
        }
        #label-container div {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0.5rem 0;
            padding: 0.8rem 1rem;
            background: var(--background-color);
            border-radius: 10px;
            border: 1px solid var(--input-border);
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .nav-link:hover {
            color: var(--text-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container animal-container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>나의 동물상 테스트</h1>
        <p style="color: var(--text-color); margin-bottom: 0.5rem; font-size: 0.95rem;">AI가 당신의 얼굴을 분석해 동물상을 찾아줍니다!</p>
        
        <div class="file-upload-wrapper">
            <button class="generate-btn file-upload-btn" type="button">사진 업로드하여 분석하기</button>
            <input type="file" id="image-upload" accept="image/*" onchange="previewAndPredict(event)">
        </div>
        
        <div class="loading-text" id="loading">AI 모델 분석 중...</div>
        <img id="image-preview" alt="미리보기 이미지" />
        <div id="label-container"></div>
        
        <a href="index.html" class="nav-link">← 로또 번호 생성기로 돌아가기</a>
    </div>

    <div class="container disqus-container">
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-arl2ydvdaq.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/C0noC94tz/";
        let model, maxPredictions;

        // 모델을 미리 로드하여 예측 속도를 높입니다.
        async function initModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
            } catch (error) {
                console.error("모델 로딩 실패:", error);
            }
        }

        initModel();

        async function previewAndPredict(event) {
            const file = event.target.files[0];
            if (!file) return;

            const preview = document.getElementById('image-preview');
            const labelContainer = document.getElementById("label-container");
            const loading = document.getElementById('loading');
            
            // 분석 중 텍스트 표시 및 이전 결과 초기화
            loading.style.display = 'block';
            labelContainer.innerHTML = '';
            preview.style.display = 'none';

            const reader = new FileReader();
            reader.onload = async function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                
                // 이미지가 완전히 화면에 로드된 후 예측 함수 실행
                preview.onload = async function() {
                    if (!model) {
                        await initModel(); 
                    }
                    await predict(preview);
                    loading.style.display = 'none';
                }
            };
            reader.readAsDataURL(file);
        }

        async function predict(imageElement) {
            if (!model) return;
            
            // 두 번째 인자 false는 이미지를 뒤집지 않음을 의미합니다.
            const prediction = await model.predict(imageElement, false);
            
            // 확률이 높은 순서대로 정렬
            prediction.sort((a, b) => b.probability - a.probability);
            
            const labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ''; 

            for (let i = 0; i < maxPredictions; i++) {
                const probability = Math.round(prediction[i].probability * 100);
                const classDiv = document.createElement("div");
                classDiv.innerHTML = `<span>${prediction[i].className}</span><span>${probability}%</span>`;
                labelContainer.appendChild(classDiv);
            }
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggleBtn.textContent = '☀️';
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            themeToggleBtn.textContent = isDarkMode ? '☀️' : '🌙';
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        });
    </script>
</body>
</html>
