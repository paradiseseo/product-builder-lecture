<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers">
        </div>
        <button class="generate-btn">Generate Numbers</button>
        <div style="margin-top: 1.5rem;">
            <a href="animal.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600; transition: color 0.3s;">🐶 동물상 테스트 하러가기 →</a>
        </div>
    </div>

    <div class="container partnership-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mvzwgqdk" method="POST">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
            </div>
            <button type="submit" class="submit-btn">보내기</button>
        </form>
    </div>
